<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubicación del Gimnasio - Body Shop Naco</title>
    <style>
        :root {
            --color-principal: #FF5722; 
            --color-secundario: #212121; 
            --color-fondo: #121212; 
            --color-texto: #E0E0E0; 
        }

        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--color-fondo);
            color: var(--color-texto);
            line-height: 1.6;
        }

       
        .header {
            background-color: var(--color-secundario);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--color-principal);
        }

        .logo {
            font-size: 2em;
            font-weight: bold;
            color: var(--color-principal);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-menu ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        .nav-menu ul li a {
            color: var(--color-texto);
            text-decoration: none;
            padding: 10px 15px;
            display: block;
            transition: color 0.3s, background-color 0.3s;
            font-weight: bold;
        }

        .nav-menu ul li a:hover {
            color: var(--color-secundario);
            background-color: var(--color-principal);
        }

        
        .seccion {
            padding: 80px 5%;
            text-align: center;
        }

        .seccion:nth-child(odd) {
            background-color: var(--color-secundario);
        }

        .seccion h2 {
            font-size: 2.5em;
            margin-bottom: 40px;
            color: var(--color-principal);
            text-transform: uppercase;
        }

       
        #hero {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('placeholder-gym-banner.jpg') no-repeat center center/cover;
            color: white;
            padding: 150px 5%;
        }

        #hero h1 {
            font-size: 3.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .btn-principal {
            display: inline-block;
            background-color: var(--color-principal);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 20px;
            transition: background-color 0.3s;
        }

        .btn-principal:hover {
            background-color: #E64A19; 
        }

       
        .tarjetas-contenedor {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
        }

        .tarjeta {
            background-color: #333;
            padding: 20px;
            border-radius: 8px;
            width: 30%;
            min-width: 250px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            border-top: 5px solid var(--color-principal);
        }

        .tarjeta h3 {
            color: var(--color-principal);
            margin-top: 0;
        }

      
        .footer {
            background-color: var(--color-secundario);
            color: var(--color-texto);
            text-align: center;
            padding: 30px 5%;
            border-top: 3px solid var(--color-principal);
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Gymnasio fuerza total</h1>
    </header>

    <div class="container">
        
        <section class="map-section">
            <h2>¡Encuéntranos en Santo Domingo!</h2>
            <p>Aquí puedes ver nuestra ubicación exacta. ¡Te esperamos!</p>
            
            <div class="map-container">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3783.3328224795367!2d-69.93290942484084!3d18.49070857502854!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8eaf892b1b3699c3%3A0x1d532a221f780e22!2sBody%20Shop%20Athletic%20Club%20(Naco)!5e0!3m2!1ses!2sdo!4v1700000000000!5m2!1ses!2sdo" 
                    allowfullscreen="" 
                    loading="lazy" 
                    referrerpolicy="no-referrer-when-downgrade"
                    width="1300" height="600">
                    
                </iframe>
            </div>

            <a 
                href="https://maps.app.goo.gl/3wA2b5d4E7XyZ7S4A" 
                target="_blank" 
                class="directions-link">
                 Abrir en Google Maps para Obtener Ruta
            </a>

            <p style="margin-top: 15px;">**Dirección:** Calle Max Henríquez Ureña #21, fuerzatotal, Santo Domingo.</p>

        </section>
    </div>

</body>
</html>
